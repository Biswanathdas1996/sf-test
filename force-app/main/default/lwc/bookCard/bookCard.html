<template>
    <div
        class="book-card slds-box slds-box_x-small"
        onclick={handleCardClick}
        onkeypress={handleKeyPress}
        role="button"
        tabindex="0"
        aria-label={book.Name}
    >
        <!-- Book Cover Image -->
        <div class="book-cover-container">
            <img
                src={coverImageUrl}
                alt={book.Name}
                class="book-cover"
            />
        </div>

        <!-- Book Details -->
        <div class="book-details">
            <h3 class="slds-text-heading_small slds-truncate book-title" title={book.Name}>
                {book.Name}
            </h3>

            <div class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
                <lightning-icon
                    icon-name="utility:user"
                    size="xx-small"
                    class="slds-m-right_xx-small"
                ></lightning-icon>
                <span class="author-name">{book.Author__c}</span>
            </div>

            <div class="slds-text-body_small slds-m-top_x-small book-description">
                {truncatedDescription}
            </div>

            <div class="book-footer slds-m-top_small">
                <div class="slds-grid slds-grid_vertical-align-center">
                    <div class="slds-col">
                        <span class="slds-text-heading_small price">{formattedPrice}</span>
                    </div>
                    <div class="slds-col_bump-left">
                        <lightning-button
                            label="View Reviews"
                            variant="brand"
                            class="slds-m-left_x-small"
                            onclick={handleCardClick}
                        ></lightning-button>
                    </div>
                </div>

                <div class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">
                    <lightning-icon
                        icon-name="utility:date_input"
                        size="xx-small"
                        class="slds-m-right_xx-small"
                    ></lightning-icon>
                    {formattedDate}
                </div>
            </div>
        </div>
    </div>
</template>
